# ACIF conformance suite manifest (CHANGE-PROCESS.md).
#
# The published, monotonic artifact consumers compare a conformance
# report's pinned hashes against. One entry per suite change, newest
# first; every suite change MUST append an entry (the runner selftest
# fails if the head entry drifts from the working tree).
#
# change_class: initial | b | c | repair | mixed — what kind of change
# produced the entry. Class C entries carry their expectation-flip
# inventory in the SHAPE.md decision row the note names. `repair`
# corrects a published vector or binding whose expectation no conforming
# implementation could satisfy (CHANGE-PROCESS.md "Suite-defect
# repairs"); its note names the repaired vectors. Prior suite history
# predates this manifest and lives in git.

